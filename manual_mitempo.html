<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Manual · MiTempo Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: #faf8f4;
    color: #111827;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01" on, "cv11" on;
  }
  ::selection { background: #fde68a; }

  .app {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: 100vh;
  }

  .sidebar {
    position: sticky; top: 0;
    height: 100vh;
    padding: 36px 24px;
    background: #fefcf7;
    border-right: 1px solid #ececec;
    display: flex; flex-direction: column;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 40px;
  }
  .brand-mark {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Serif Display', serif;
    font-size: 19px;
    box-shadow: 0 4px 12px rgba(16, 185, 129, 0.25);
  }
  .brand-name {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    letter-spacing: -0.3px;
    line-height: 1;
  }
  .brand-sub {
    font-size: 10px;
    color: #9ca3af;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .nav-label {
    font-size: 10px;
    color: #9ca3af;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin: 0 0 10px 12px;
    font-weight: 600;
  }
  .nav-list {
    list-style: none; padding: 0; margin: 0 0 24px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    font-size: 14px;
    color: #4b5563;
    font-weight: 500;
    user-select: none;
  }
  .nav-item:hover {
    background: rgba(0,0,0,0.03);
    color: #111827;
  }
  .nav-item.active {
    background: #111827;
    color: white;
  }
  .nav-item.active .nav-num { color: rgba(255,255,255,0.5); }
  .nav-num {
    font-size: 11px;
    color: #d1d5db;
    font-family: 'JetBrains Mono', monospace;
    margin-right: 2px;
    width: 22px;
  }
  .nav-dot {
    width: 7px; height: 7px; border-radius: 50%;
    flex-shrink: 0;
  }

  .progress {
    margin-top: auto;
    padding-top: 20px;
    border-top: 1px solid #ececec;
  }
  .progress-label {
    display: flex; justify-content: space-between;
    font-size: 11px; color: #9ca3af;
    letter-spacing: 0.8px; text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .progress-bar {
    height: 4px; background: #ececec; border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #10b981, #059669);
    border-radius: 999px;
    transition: width 0.4s ease;
  }

  .main {
    padding: 64px 80px 120px;
    max-width: 860px;
  }
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 48px;
    font-size: 12px; color: #9ca3af;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
  }
  .topbar-right {
    display: flex; align-items: center; gap: 16px;
  }
  .pill {
    padding: 4px 10px;
    background: white;
    border: 1px solid #ececec;
    border-radius: 999px;
    font-size: 11px;
    color: #6b7280;
  }

  .section-transition {
    animation: fadeUp 0.4s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .footer-nav {
    margin-top: 80px;
    padding-top: 32px;
    border-top: 1px solid #ececec;
    display: flex; justify-content: space-between; gap: 16px;
  }
  .footer-btn {
    display: flex; flex-direction: column; gap: 4px;
    padding: 18px 22px;
    background: white;
    border: 1px solid #ececec;
    border-radius: 14px;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s, transform 0.15s;
    min-width: 200px;
    font-family: inherit;
    text-align: left;
  }
  .footer-btn:hover:not(:disabled) {
    border-color: #d1d5db;
    transform: translateY(-1px);
  }
  .footer-btn-label {
    font-size: 11px; color: #9ca3af;
    letter-spacing: 0.8px; text-transform: uppercase;
    font-weight: 600;
  }
  .footer-btn-title {
    font-size: 15px; font-weight: 600; color: #111827;
  }
  .footer-btn.next { text-align: right; }

  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { position: static; height: auto; }
    .main { padding: 32px 24px 80px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="mocks.jsx"></script>
<script type="text/babel" src="drive-mocks.jsx"></script>
<script type="text/babel" src="sections.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const SECTIONS = [
  { id: 'intro', label: 'Bienvenida', num: '00', dot: '#9ca3af', Comp: () => window.IntroSection() },
  { id: 'hoja', label: 'Tu Hoja de Cálculo', num: '01', dot: '#22c55e', Comp: () => window.HojaSection() },
  { id: 'dashboard', label: 'Dashboard', num: '02', dot: '#10b981', Comp: () => window.DashboardSection() },
  { id: 'tablas', label: 'Tablas', num: '03', dot: '#3b82f6', Comp: () => window.TablasSection() },
  { id: 'presupuesto', label: 'Presupuesto', num: '04', dot: '#f59e0b', Comp: () => window.PresupuestoSection() },
  { id: 'notas', label: 'Notas', num: '05', dot: '#a855f7', Comp: () => window.NotasSection() },
  { id: 'tips', label: 'Tips finales', num: '06', dot: '#0ea5e9', Comp: () => window.TipsSection() },
];

function App() {
  const [current, setCurrent] = useState(() => {
    return localStorage.getItem('mitempo-manual-section') || 'intro';
  });

  useEffect(() => {
    localStorage.setItem('mitempo-manual-section', current);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, [current]);

  const idx = SECTIONS.findIndex((s) => s.id === current);
  const section = SECTIONS[idx];
  const prev = idx > 0 ? SECTIONS[idx - 1] : null;
  const next = idx < SECTIONS.length - 1 ? SECTIONS[idx + 1] : null;
  const progress = (idx + 1) / SECTIONS.length * 100;

  return (
    <div className="app">
      <aside className="sidebar">
        <div className="brand">
          <div className="brand-mark">M</div>
          <div>
            <div className="brand-name">MiTempo</div>
            <div className="brand-sub">MANUAL DEL USUARIO</div>
          </div>
        </div>

        <div className="nav-label">Capítulos</div>
        <ul className="nav-list">
          {SECTIONS.map((s) => (
            <li
              key={s.id}
              className={'nav-item' + (s.id === current ? ' active' : '')}
              onClick={() => setCurrent(s.id)}
              data-screen-label={s.num + ' ' + s.label}>
              <span className="nav-num">{s.num}</span>
              <span className="nav-dot" style={{ background: s.dot }}></span>
              <span>{s.label}</span>
            </li>
          ))}
        </ul>

        <div className="progress">
          <div className="progress-label">
            <span>Progreso</span>
            <span>{idx + 1} / {SECTIONS.length}</span>
          </div>
          <div className="progress-bar">
            <div className="progress-fill" style={{ width: progress + '%' }}></div>
          </div>
        </div>
      </aside>

      <main className="main" data-screen-label={section.num + ' ' + section.label}>
        <div className="topbar">
          <span>MANUAL · MITEMPO.APP</span>
          <div className="topbar-right">
            <span className="pill">Capítulo {section.num}</span>
            <span>ABR 2026</span>
          </div>
        </div>

        <div className="section-transition" key={current}>
          {section.Comp()}
        </div>

        <nav className="footer-nav">
          {prev ? (
            <button className="footer-btn" onClick={() => setCurrent(prev.id)}>
              <span className="footer-btn-label">← Anterior</span>
              <span className="footer-btn-title">{prev.label}</span>
            </button>
          ) : <span></span>}
          {next ? (
            <button className="footer-btn next" onClick={() => setCurrent(next.id)}>
              <span className="footer-btn-label">Siguiente →</span>
              <span className="footer-btn-title">{next.label}</span>
            </button>
          ) : <span></span>}
        </nav>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
