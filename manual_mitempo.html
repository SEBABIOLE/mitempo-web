<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Manual · MiTempo Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: #faf8f4;
    color: #111827;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01" on, "cv11" on;
  }
  ::selection { background: #fde68a; }

  .app {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: 100vh;
  }

  .sidebar {
    position: sticky; top: 0;
    height: 100vh;
    padding: 36px 24px;
    background: #fefcf7;
    border-right: 1px solid #ececec;
    display: flex; flex-direction: column;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 40px;
  }
  .brand-mark {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    color: white;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Serif Display', serif;
    font-size: 19px;
    box-shadow: 0 4px 12px rgba(16, 185, 129, 0.25);
  }
  .brand-name {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    letter-spacing: -0.3px;
    line-height: 1;
  }
  .brand-sub {
    font-size: 10px;
    color: #9ca3af;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .nav-label {
    font-size: 10px;
    color: #9ca3af;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin: 0 0 10px 12px;
    font-weight: 600;
  }
  .nav-list {
    list-style: none; padding: 0; margin: 0 0 24px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    font-size: 14px;
    color: #4b5563;
    font-weight: 500;
    user-select: none;
  }
  .nav-item:hover {
    background: rgba(0,0,0,0.03);
    color: #111827;
  }
  .nav-item.active {
    background: #111827;
    color: white;
  }
  .nav-item.active .nav-num { color: rgba(255,255,255,0.5); }
  .nav-num {
    font-size: 11px;
    color: #d1d5db;
    font-family: 'JetBrains Mono', monospace;
    margin-right: 2px;
    width: 22px;
  }
  .nav-dot {
    width: 7px; height: 7px; border-radius: 50%;
    flex-shrink: 0;
  }

  .progress {
    margin-top: auto;
    padding-top: 20px;
    border-top: 1px solid #ececec;
  }
  .progress-label {
    display: flex; justify-content: space-between;
    font-size: 11px; color: #9ca3af;
    letter-spacing: 0.8px; text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .progress-bar {
    height: 4px; background: #ececec; border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #10b981, #059669);
    border-radius: 999px;
    transition: width 0.4s ease;
  }

  .main {
    padding: 64px 80px 120px;
    max-width: 860px;
  }
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 48px;
    font-size: 12px; color: #9ca3af;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
  }
  .topbar-right {
    display: flex; align-items: center; gap: 16px;
  }
  .pill {
    padding: 4px 10px;
    background: white;
    border: 1px solid #ececec;
    border-radius: 999px;
    font-size: 11px;
    color: #6b7280;
  }

  .section-transition {
    animation: fadeUp 0.4s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .footer-nav {
    margin-top: 80px;
    padding-top: 32px;
    border-top: 1px solid #ececec;
    display: flex; justify-content: space-between; gap: 16px;
  }
  .footer-btn {
    display: flex; flex-direction: column; gap: 4px;
    padding: 18px 22px;
    background: white;
    border: 1px solid #ececec;
    border-radius: 14px;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s, transform 0.15s;
    min-width: 200px;
    font-family: inherit;
    text-align: left;
  }
  .footer-btn:hover:not(:disabled) {
    border-color: #d1d5db;
    transform: translateY(-1px);
  }
  .footer-btn-label {
    font-size: 11px; color: #9ca3af;
    letter-spacing: 0.8px; text-transform: uppercase;
    font-weight: 600;
  }
  .footer-btn-title {
    font-size: 15px; font-weight: 600; color: #111827;
  }
  .footer-btn.next { text-align: right; }

  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { position: static; height: auto; }
    .main { padding: 32px 24px 80px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
// Mini visual mockups of dashboard elements - used to illustrate explanations

const fmt = (n) => '$' + n.toLocaleString('es-AR');

function StatCard({ color, label, value, delta, deltaDir, icon }) {
  const colorMap = {
    green: { bg: '#ecfdf5', border: '#a7f3d0', text: '#047857', accent: '#10b981' },
    red:   { bg: '#fef2f2', border: '#fecaca', text: '#b91c1c', accent: '#ef4444' },
    blue:  { bg: '#eff6ff', border: '#bfdbfe', text: '#1e40af', accent: '#3b82f6' },
    amber: { bg: '#fffbeb', border: '#fde68a', text: '#92400e', accent: '#f59e0b' },
  };
  const c = colorMap[color];
  return (
    <div style={{
      background: 'white',
      border: `1px solid ${c.border}`,
      borderRadius: 14,
      padding: '16px 18px',
      position: 'relative',
      overflow: 'hidden',
    }}>
      <div style={{
        position: 'absolute', top: 0, left: 0, width: 4, height: '100%', background: c.accent,
      }} />
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
        <span style={{ fontSize: 14 }}>{icon}</span>
        <span style={{ fontSize: 11, color: '#6b7280', fontWeight: 500, letterSpacing: 0.3, textTransform: 'uppercase' }}>
          {label}
        </span>
      </div>
      <div style={{ fontSize: 22, fontWeight: 600, color: '#111827', fontFamily: 'DM Serif Display, serif', letterSpacing: -0.5 }}>
        {value}
      </div>
      {delta && (
        <div style={{ fontSize: 12, color: c.text, marginTop: 4, fontWeight: 500 }}>
          {deltaDir === 'up' ? '↑' : '↓'} {delta} vs mes anterior
        </div>
      )}
    </div>
  );
}

function MiniStatGrid() {
  return (
    <div style={{
      display: 'grid',
      gridTemplateColumns: 'repeat(4, 1fr)',
      gap: 10,
      padding: 16,
      background: '#f9fafb',
      borderRadius: 16,
      border: '1px solid #e5e7eb',
    }}>
      <StatCard color="green" icon="💚" label="Ingresos" value={fmt(150000)} delta="5%" deltaDir="up" />
      <StatCard color="red" icon="🔴" label="Egresos" value={fmt(120000)} delta="12%" deltaDir="up" />
      <StatCard color="blue" icon="🔵" label="Balance" value={'+' + fmt(30000)} />
      <StatCard color="amber" icon="🟡" label="Ahorro" value="20%" />
    </div>
  );
}

function BudgetBarChart() {
  const data = [
    { name: 'Vivienda', budget: 85, real: 82 },
    { name: 'Comida', budget: 60, real: 70 },
    { name: 'Transporte', budget: 35, real: 28 },
    { name: 'Salidas', budget: 25, real: 42 },
    { name: 'Servicios', budget: 30, real: 31 },
  ];
  const max = 100;
  return (
    <div style={{
      background: 'white', borderRadius: 16, padding: 20,
      border: '1px solid #e5e7eb',
    }}>
      <div style={{ fontSize: 13, color: '#6b7280', fontWeight: 500, marginBottom: 4 }}>Abril 2026</div>
      <div style={{ fontSize: 18, fontWeight: 600, color: '#111827', marginBottom: 16, fontFamily: 'DM Serif Display, serif' }}>
        Presupuesto vs Real
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
        {data.map((d) => {
          const over = d.real > d.budget;
          return (
            <div key={d.name}>
              <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: '#374151', marginBottom: 5, fontWeight: 500 }}>
                <span>{d.name}</span>
                <span style={{ color: over ? '#dc2626' : '#059669' }}>
                  {fmt(d.real * 1000)} / {fmt(d.budget * 1000)}
                </span>
              </div>
              <div style={{ position: 'relative', height: 16, background: '#f3f4f6', borderRadius: 8, overflow: 'hidden' }}>
                <div style={{
                  position: 'absolute', top: 0, left: 0, height: '100%',
                  width: `${(d.budget / max) * 100}%`,
                  background: '#bfdbfe',
                  borderRadius: 8,
                }} />
                <div style={{
                  position: 'absolute', top: 0, left: 0, height: '100%',
                  width: `${(d.real / max) * 100}%`,
                  background: over ? 'linear-gradient(90deg, #f87171, #ef4444)' : 'linear-gradient(90deg, #34d399, #10b981)',
                  borderRadius: 8,
                  transition: 'width 0.6s ease',
                }} />
              </div>
            </div>
          );
        })}
      </div>
      <div style={{ display: 'flex', gap: 16, marginTop: 16, fontSize: 11, color: '#6b7280' }}>
        <span style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <span style={{ width: 10, height: 10, background: '#bfdbfe', borderRadius: 2, display: 'inline-block' }} /> Presupuesto
        </span>
        <span style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <span style={{ width: 10, height: 10, background: '#10b981', borderRadius: 2, display: 'inline-block' }} /> Real
        </span>
      </div>
    </div>
  );
}

function EvolutionChart() {
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const income = [140,145,150,155,148,160,170,165,158,162,170,180];
  const expense = [110,125,120,130,135,128,140,145,132,138,145,150];
  const savings = income.map((inc, i) => inc - expense[i]);
  let acc = 0;
  const accSavings = savings.map(s => (acc += s));
  const maxBar = 200;
  const maxAcc = Math.max(...accSavings);

  return (
    <div style={{
      background: 'white', borderRadius: 16, padding: 20,
      border: '1px solid #e5e7eb',
    }}>
      <div style={{ fontSize: 18, fontWeight: 600, color: '#111827', marginBottom: 4, fontFamily: 'DM Serif Display, serif' }}>
        Evolución anual
      </div>
      <div style={{ fontSize: 12, color: '#6b7280', marginBottom: 16 }}>Ingresos, egresos y ahorro acumulado</div>
      <div style={{ display: 'flex', alignItems: 'flex-end', gap: 6, height: 140, position: 'relative', paddingBottom: 20 }}>
        <svg style={{ position: 'absolute', inset: 0, pointerEvents: 'none' }} viewBox="0 0 100 100" preserveAspectRatio="none">
          <polyline
            fill="none"
            stroke="#9ca3af"
            strokeWidth="0.5"
            strokeDasharray="1 1"
            points={accSavings.map((v, i) => `${(i / (months.length - 1)) * 100},${100 - (v / maxAcc) * 80}`).join(' ')}
          />
        </svg>
        {months.map((m, i) => (
          <div key={m} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2, height: '100%', justifyContent: 'flex-end' }}>
            <div style={{ display: 'flex', gap: 1, alignItems: 'flex-end', height: '100%' }}>
              <div style={{
                width: 6, height: `${(income[i] / maxBar) * 100}%`,
                background: 'linear-gradient(180deg, #60a5fa, #3b82f6)', borderRadius: 2,
              }} />
              <div style={{
                width: 6, height: `${(expense[i] / maxBar) * 100}%`,
                background: 'linear-gradient(180deg, #fca5a5, #ef4444)', borderRadius: 2,
              }} />
            </div>
            <div style={{ fontSize: 9, color: '#9ca3af', marginTop: 4 }}>{m}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function MiniBudgetRow() {
  return (
    <div style={{
      background: 'white', borderRadius: 12, border: '1px solid #e5e7eb',
      overflow: 'hidden', fontSize: 13,
    }}>
      <div style={{
        display: 'grid', gridTemplateColumns: '1.6fr repeat(4, 1fr)',
        padding: '10px 14px', background: '#f9fafb', fontWeight: 600,
        fontSize: 11, color: '#6b7280', textTransform: 'uppercase', letterSpacing: 0.4,
      }}>
        <div>Categoría · Abril</div>
        <div style={{ textAlign: 'right' }}>Pres.</div>
        <div style={{ textAlign: 'right' }}>Real</div>
        <div style={{ textAlign: 'right' }}>Dif.</div>
        <div style={{ textAlign: 'right' }}>%</div>
      </div>
      {[
        { c: 'Supermercado', p: 30000, r: 27500 },
        { c: 'Salidas', p: 15000, r: 18200 },
        { c: 'Transporte', p: 12000, r: 8900 },
      ].map((row) => {
        const diff = row.p - row.r;
        const pct = Math.round((row.r / row.p) * 100);
        return (
          <div key={row.c} style={{
            display: 'grid', gridTemplateColumns: '1.6fr repeat(4, 1fr)',
            padding: '11px 14px', borderTop: '1px solid #f3f4f6',
          }}>
            <div style={{ color: '#111827', fontWeight: 500 }}>{row.c}</div>
            <div style={{ textAlign: 'right', color: '#4b5563' }}>{fmt(row.p)}</div>
            <div style={{ textAlign: 'right', color: '#4b5563' }}>{fmt(row.r)}</div>
            <div style={{ textAlign: 'right', color: diff >= 0 ? '#059669' : '#dc2626', fontWeight: 600 }}>
              {diff >= 0 ? '+' : ''}{fmt(diff)}
            </div>
            <div style={{ textAlign: 'right', color: pct > 100 ? '#dc2626' : '#059669', fontWeight: 600 }}>
              {pct}%
            </div>
          </div>
        );
      })}
    </div>
  );
}

function NoteCard({ color, title, content }) {
  return (
    <div style={{
      background: 'white', borderRadius: 12, padding: '14px 16px',
      border: '1px solid #e5e7eb',
      borderLeft: `4px solid ${color}`,
      boxShadow: '0 1px 2px rgba(0,0,0,0.03)',
    }}>
      <div style={{ fontWeight: 600, fontSize: 14, color: '#111827', marginBottom: 6 }}>{title}</div>
      <div style={{ fontSize: 12, color: '#6b7280', lineHeight: 1.5 }}>{content}</div>
      <div style={{ display: 'flex', gap: 8, marginTop: 10, justifyContent: 'flex-end' }}>
        <span style={{ fontSize: 11, color: '#9ca3af' }}>✏️</span>
        <span style={{ fontSize: 11, color: '#9ca3af' }}>🗑️</span>
      </div>
    </div>
  );
}

function NotesGrid() {
  return (
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 10 }}>
      <NoteCard color="#10b981" title="🛒 Súper — sábado" content={<>Leche · Pan · Agua · Huevos · Yerba · Tomates · Queso</>} />
      <NoteCard color="#f59e0b" title="💊 Farmacia" content={<>Ibuprofeno · Alcohol en gel · Vendas · Protector solar</>} />
      <NoteCard color="#3b82f6" title="🏠 Casa" content={<>Focos LED · Pilas AA · Detergente · Papel higiénico</>} />
    </div>
  );
}

function WhatsAppBubble({ text, from }) {
  const isUser = from === 'user';
  return (
    <div style={{
      display: 'flex',
      justifyContent: isUser ? 'flex-end' : 'flex-start',
      marginBottom: 8,
    }}>
      <div style={{
        background: isUser ? '#dcf8c6' : 'white',
        padding: '8px 12px',
        borderRadius: 12,
        fontSize: 13,
        maxWidth: '75%',
        boxShadow: '0 1px 1px rgba(0,0,0,0.06)',
        color: '#111827',
        lineHeight: 1.4,
      }}>
        {text}
      </div>
    </div>
  );
}

function WhatsAppMock() {
  return (
    <div style={{
      background: '#e5ddd5',
      backgroundImage: 'radial-gradient(circle at 20% 30%, rgba(255,255,255,0.3) 0, transparent 40%)',
      borderRadius: 16,
      padding: 16,
      border: '1px solid #d1d5db',
    }}>
      <div style={{
        background: '#075e54', color: 'white', padding: '8px 12px',
        borderRadius: '10px 10px 0 0', margin: '-16px -16px 12px', fontSize: 13, fontWeight: 500,
        display: 'flex', alignItems: 'center', gap: 8,
      }}>
        <div style={{ width: 28, height: 28, borderRadius: '50%', background: '#10b981', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14 }}>M</div>
        <div>
          <div>MiTempo</div>
          <div style={{ fontSize: 10, opacity: 0.8 }}>en línea</div>
        </div>
      </div>
      <WhatsAppBubble from="user" text="dashboard" />
      <WhatsAppBubble from="bot" text="¡Hola! Acá tenés tu acceso 👇" />
      <WhatsAppBubble from="bot" text="🔗 mitempo.app/d/xk9m2a" />
      <WhatsAppBubble from="bot" text="Link válido por 24 hs." />
    </div>
  );
}

Object.assign(window, {
  StatCard, MiniStatGrid, BudgetBarChart, EvolutionChart,
  MiniBudgetRow, NoteCard, NotesGrid, WhatsAppMock, fmt,
});

</script>
<script type="text/babel" data-presets="react">
// Visual mockups for the spreadsheet (Drive) chapter

function DriveFileCard() {
  return (
    <div style={{
      display: 'grid',
      gridTemplateColumns: '64px 1fr auto',
      gap: 18,
      alignItems: 'center',
      padding: '20px 22px',
      background: 'white',
      border: '1px solid #eef0f2',
      borderRadius: 16,
      boxShadow: '0 1px 0 rgba(17,24,39,0.02), 0 8px 24px -16px rgba(17,24,39,0.12)',
    }}>
      <div style={{
        width: 56, height: 56, borderRadius: 12,
        background: 'linear-gradient(135deg, #15803d 0%, #16a34a 100%)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        boxShadow: '0 6px 14px -4px rgba(22,163,74,0.45)',
      }}>
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="18" height="18" rx="2" stroke="white" strokeWidth="1.6"></rect>
          <path d="M3 9h18M3 15h18M9 3v18M15 3v18" stroke="white" strokeWidth="1.4" opacity="0.85"></path>
        </svg>
      </div>
      <div>
        <div style={{
          fontSize: 16, fontWeight: 600, color: '#111827',
          fontFamily: 'DM Sans, sans-serif', letterSpacing: -0.2, marginBottom: 4,
        }}>
          MiTempo — Registro de Ingresos y Gastos
        </div>
        <div style={{
          fontSize: 12, color: '#6b7280', display: 'flex', gap: 10, alignItems: 'center',
          fontFamily: 'JetBrains Mono, monospace', letterSpacing: 0.2,
        }}>
          <span>HOJA DE CÁLCULO</span>
          <span style={{ width: 3, height: 3, background: '#d1d5db', borderRadius: '50%' }}></span>
          <span>EN TU DRIVE</span>
          <span style={{ width: 3, height: 3, background: '#d1d5db', borderRadius: '50%' }}></span>
          <span>SOLO TUYA</span>
        </div>
      </div>
      <div style={{
        padding: '6px 12px', borderRadius: 999,
        background: '#ecfdf5', color: '#047857',
        fontSize: 11, fontWeight: 600, letterSpacing: 0.5, textTransform: 'uppercase',
        border: '1px solid #a7f3d0',
      }}>
        ✓ Conectada
      </div>
    </div>
  );
}

function SheetTabsMock({ active = 'Ingresos' }) {
  const tabs = [
    { name: 'Ingresos', color: '#10b981' },
    { name: 'Egresos', color: '#ef4444' },
    { name: 'Categorias', color: '#a855f7' },
    { name: 'Presupuesto', color: '#f59e0b' },
  ];
  return (
    <div style={{
      background: '#f1f3f4',
      borderRadius: 12,
      padding: '10px 10px 0',
      border: '1px solid #e5e7eb',
    }}>
      <div style={{ display: 'flex', gap: 4, alignItems: 'flex-end' }}>
        {tabs.map((t) => {
          const isActive = t.name === active;
          return (
            <div key={t.name} style={{
              padding: '8px 14px',
              background: isActive ? 'white' : 'transparent',
              borderRadius: '8px 8px 0 0',
              fontSize: 12,
              fontWeight: isActive ? 600 : 500,
              color: isActive ? '#111827' : '#6b7280',
              borderBottom: isActive ? `2px solid ${t.color}` : '2px solid transparent',
              display: 'flex', alignItems: 'center', gap: 6,
              cursor: 'default',
            }}>
              <span style={{
                width: 7, height: 7, borderRadius: '50%', background: t.color,
              }}></span>

          ['📭', '¿No ves nada todavía?', 'Si entrás y está vacío, es normal al principio. Empezá a registrar gastos por WhatsApp y en minutos van a aparecer.'],
          ['📱', 'Instalalo como app', 'Desde el celular, el navegador te va a ofrecer "Agregar a pantalla de inicio". Aceptá y queda como una app más — sin pasar por la tienda.'],
          ['🔒', 'Tus datos son solo tuyos', 'Solo vos podés ver tu dashboard. Nadie más tiene acceso a tu información financiera.'],

        ].map(([icon, title, body]) => (
          <div key={title} style={{
            display: 'grid', gridTemplateColumns: '48px 1fr', gap: 18,

            background: 'white', border: '1px solid #eef0f2', borderRadius: 14,

            <div style={{
              width: 44, height: 44, borderRadius: 10,
              background: '#f9fafb', fontSize: 22,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>{icon}</div>
            <div>

              <div style={{ fontSize: 14, color: '#4b5563', lineHeight: 1.6 }}>{body}</div>

      <div style={{

      }}>

        </div>
        <div style={{ fontSize: 15, opacity: 0.75, maxWidth: 520, margin: '0 auto', lineHeight: 1.6 }}>
          Escribile cosas como "¿cuánto gasté este mes?", "mostrá mis gastos de abril" o "quiero ver mi dashboard".
        </div>
        <div style={{ marginTop: 24, fontSize: 12, opacity: 0.4, letterSpacing: 0.5 }}>

}

Object.assign(window, {
  IntroSection, HojaSection, DashboardSection, TablasSection,
  PresupuestoSection, NotasSection, TipsSection,
});

</script>

<script type="text/babel">
const { useState, useEffect } = React;

const SECTIONS = [
  { id: 'intro', label: 'Bienvenida', num: '00', dot: '#9ca3af', Comp: () => window.IntroSection() },
  { id: 'hoja', label: 'Tu Hoja de Cálculo', num: '01', dot: '#22c55e', Comp: () => window.HojaSection() },
  { id: 'dashboard', label: 'Dashboard', num: '02', dot: '#10b981', Comp: () => window.DashboardSection() },
  { id: 'tablas', label: 'Tablas', num: '03', dot: '#3b82f6', Comp: () => window.TablasSection() },
  { id: 'presupuesto', label: 'Presupuesto', num: '04', dot: '#f59e0b', Comp: () => window.PresupuestoSection() },
  { id: 'notas', label: 'Notas', num: '05', dot: '#a855f7', Comp: () => window.NotasSection() },
  { id: 'tips', label: 'Tips finales', num: '06', dot: '#0ea5e9', Comp: () => window.TipsSection() },
];

function App() {
  const [current, setCurrent] = useState(() => {
    return localStorage.getItem('mitempo-manual-section') || 'intro';
  });

  useEffect(() => {
    localStorage.setItem('mitempo-manual-section', current);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, [current]);

  const idx = SECTIONS.findIndex((s) => s.id === current);
  const section = SECTIONS[idx];
  const prev = idx > 0 ? SECTIONS[idx - 1] : null;
  const next = idx < SECTIONS.length - 1 ? SECTIONS[idx + 1] : null;
  const progress = (idx + 1) / SECTIONS.length * 100;

  return (
    <div className="app">
      <aside className="sidebar">
        <div className="brand">
          <div className="brand-mark">M</div>
          <div>
            <div className="brand-name">MiTempo</div>
            <div className="brand-sub">MANUAL DEL USUARIO</div>
          </div>
        </div>

        <div className="nav-label">Capítulos</div>
        <ul className="nav-list">
          {SECTIONS.map((s) => (
            <li
              key={s.id}
              className={'nav-item' + (s.id === current ? ' active' : '')}
              onClick={() => setCurrent(s.id)}
              data-screen-label={s.num + ' ' + s.label}>
              <span className="nav-num">{s.num}</span>
              <span className="nav-dot" style={{ background: s.dot }}></span>
              <span>{s.label}</span>
            </li>
          ))}
        </ul>

        <div className="progress">
          <div className="progress-label">
            <span>Progreso</span>
            <span>{idx + 1} / {SECTIONS.length}</span>
          </div>
          <div className="progress-bar">
            <div className="progress-fill" style={{ width: progress + '%' }}></div>
          </div>
        </div>
      </aside>

      <main className="main" data-screen-label={section.num + ' ' + section.label}>
        <div className="topbar">
          <span>MANUAL · MITEMPO.APP</span>
          <div className="topbar-right">
            <span className="pill">Capítulo {section.num}</span>
            <span>ABR 2026</span>
          </div>
        </div>

        <div className="section-transition" key={current}>
          {section.Comp()}
        </div>

        <nav className="footer-nav">
          {prev ? (
            <button className="footer-btn" onClick={() => setCurrent(prev.id)}>
              <span className="footer-btn-label">← Anterior</span>
              <span className="footer-btn-title">{prev.label}</span>
            </button>
          ) : <span></span>}
          {next ? (
            <button className="footer-btn next" onClick={() => setCurrent(next.id)}>
              <span className="footer-btn-label">Siguiente →</span>
              <span className="footer-btn-title">{next.label}</span>
            </button>
          ) : <span></span>}
        </nav>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
