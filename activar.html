<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="/Logo%20con%20blanco.png">
  <link rel="shortcut icon" href="/Logo%20con%20blanco.png">
  <link rel="apple-touch-icon" href="/Logo%20con%20blanco.png">
  <title>Activar MiTempo | Paso 2 de 3</title>
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; base-uri 'self';
                 script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com;
                 style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
                 font-src https://fonts.gstatic.com;
                 img-src 'self' data:;
                 connect-src 'self';
                 frame-ancestors 'none';">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-green-50 via-white to-emerald-50 flex items-center justify-center p-4">
  <div class="bg-white w-full max-w-sm rounded-3xl shadow-xl overflow-hidden">

    <!-- Top bar -->
    <div class="bg-gradient-to-r from-green-500 to-emerald-500 px-6 pt-6 pb-8">
      <div class="flex items-center gap-2 mb-4">
        <div class="flex gap-1.5">
          <span class="w-2 h-2 rounded-full bg-white opacity-40"></span>
          <span class="w-2 h-2 rounded-full bg-white"></span>
          <span class="w-2 h-2 rounded-full bg-white opacity-40"></span>
        </div>
        <span class="text-xs text-white opacity-70 font-medium">Paso 2 de 3</span>
      </div>
      <h1 class="text-2xl font-bold text-white leading-tight">Activá tu cuenta</h1>
      <p id="hello" class="text-green-100 text-sm mt-1"></p>
    </div>

    <!-- Content -->
    <div class="px-6 py-6 -mt-4">

      <!-- Steps -->
      <div class="space-y-3 mb-6">

        <div class="flex gap-4 items-start bg-gray-50 rounded-2xl p-4 border border-gray-100">
          <div class="shrink-0 w-11 h-11 rounded-xl bg-green-500 flex items-center justify-center shadow-sm">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" width="22" height="22">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
          </div>
          <div class="pt-0.5">
            <p class="font-semibold text-gray-900 text-sm">Abrí WhatsApp</p>
            <p class="text-xs text-gray-500 mt-0.5 leading-relaxed">Usá el botón de abajo para abrir el chat con nuestro número.</p>
          </div>
        </div>

        <!-- Connector -->
        <div class="flex justify-start pl-9">
          <div class="w-0.5 h-3 bg-gray-200 rounded-full"></div>
        </div>

        <div class="flex gap-4 items-start bg-blue-50 rounded-2xl p-4 border border-blue-100">
          <div class="shrink-0 w-11 h-11 rounded-xl bg-blue-500 flex items-center justify-center shadow-sm">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" width="20" height="20">
              <path d="M9 12.5l2 2 4-4M12 2a10 10 0 100 20A10 10 0 0012 2z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
          </div>
          <div class="pt-0.5">
            <p class="font-semibold text-gray-900 text-sm">Tocá <span class="text-blue-600">"Activar cuenta"</span></p>
            <p class="text-xs text-gray-500 mt-0.5 leading-relaxed">El bot ya te mandó un mensaje con el botón para conectar tu cuenta de Google.</p>
          </div>
        </div>

      </div>

      <!-- CTA Button -->
      <a id="waBtn"
         href="#"
         target="_blank"
         rel="noopener"
         class="flex items-center justify-center gap-2.5 w-full bg-green-500 hover:bg-green-600 active:scale-95 text-white font-semibold py-4 rounded-2xl transition-all duration-150 shadow-md shadow-green-200">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" width="20" height="20">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        Abrir WhatsApp
      </a>

      <p class="text-xs text-gray-400 mt-4 text-center leading-relaxed">
        Si WhatsApp no abre, agregá nuestro número manualmente y abrí el chat.
      </p>

    </div>
  </div>

<script>

  const WHATSAPP_NUMBER = '5493382674705'; // sin +

  const qp = new URLSearchParams(location.search);
  const u = (qp.get('u') || '').replace(/\D/g, '').slice(-10);
  const p = (qp.get('p') || '').toLowerCase();
  const n = (qp.get('n') || '').replace(/[<>"'`]/g, '');

  if (!/^\d{10}$/.test(u) || !p) {
    document.body.innerHTML = `
      <div class="max-w-md mx-auto p-6 text-center">
        <h2 class="text-xl font-semibold mb-2">Faltan datos para activar</h2>
        <p class="text-gray-600">Volvé al registro e intentá nuevamente.</p>
      </div>`;
  }

  document.getElementById('hello').textContent =
    n ? `Hola ${n}, ya casi terminás.` : 'Ya casi terminás.';

  document.getElementById('waBtn').href = `https://wa.me/${WHATSAPP_NUMBER}`;

</script>

</body>
</html>
